<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OberFans</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
    --bg:     #0a0a0f;
    --bg2:    #111118;
    --card:   #16161e;
    --border: rgba(255,255,255,0.07);
    --bord2:  rgba(255,255,255,0.12);
    --text:   #e8e8f0;
    --muted:  #5a5a72;
    --accent: #c8ff00;
    --purple: #7c3aed;
    --pink:   #ff2d78;
    --danger: #ff4545;
    --r:      16px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
    font-family:'Outfit',sans-serif;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    overflow-x:hidden;
}
/* grain overlay */
body::before{
    content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
    opacity:.5;
}
/* ambient blobs */
.blob{position:fixed;border-radius:50%;pointer-events:none;z-index:0;filter:blur(80px);}
.blob1{width:500px;height:500px;top:-150px;left:-150px;background:radial-gradient(circle,rgba(124,58,237,.09),transparent 70%);}
.blob2{width:400px;height:400px;bottom:-100px;right:-100px;background:radial-gradient(circle,rgba(200,255,0,.06),transparent 70%);}

/* ─── AUTH ─────────────────────────────── */
#auth-overlay{
    position:fixed;inset:0;z-index:9000;
    display:flex;align-items:center;justify-content:center;padding:20px;
    background:var(--bg);
}
.auth-wrap{
    position:relative;z-index:1;
    width:100%;max-width:430px;
    animation:authIn .55s cubic-bezier(.22,1,.36,1) both;
}
@keyframes authIn{from{opacity:0;transform:translateY(28px) scale(.97)}to{opacity:1;transform:none}}

.auth-logo{text-align:center;margin-bottom:30px;}
.auth-logo-text{
    font-family:'Bebas Neue',sans-serif;font-size:4.2rem;letter-spacing:5px;
    background:linear-gradient(130deg,var(--accent) 0%,#90ff20 40%,var(--purple) 100%);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    line-height:1;filter:drop-shadow(0 0 22px rgba(200,255,0,.28));
}
.auth-logo-sub{
    font-size:.72rem;color:var(--muted);
    letter-spacing:.28em;text-transform:uppercase;margin-top:7px;
}

.auth-card{
    background:var(--card);
    border:1px solid var(--bord2);
    border-radius:22px;overflow:hidden;
    box-shadow:0 32px 80px rgba(0,0,0,.65),inset 0 1px 0 rgba(255,255,255,.05);
}
.auth-tabs{display:flex;border-bottom:1px solid var(--border);}
.auth-tab{
    flex:1;padding:17px;background:none;border:none;
    color:var(--muted);font-family:'Outfit',sans-serif;
    font-weight:600;font-size:.88rem;cursor:pointer;
    letter-spacing:.3px;transition:color .2s;position:relative;
}
.auth-tab::after{
    content:'';position:absolute;bottom:0;left:50%;right:50%;height:2px;
    background:var(--accent);transition:all .3s cubic-bezier(.22,1,.36,1);
}
.auth-tab.active{color:var(--accent);}
.auth-tab.active::after{left:18%;right:18%;}

.auth-body{padding:26px 28px 30px;}
.auth-err{
    background:rgba(255,69,69,.1);border:1px solid rgba(255,69,69,.25);
    color:#ff8080;padding:10px 14px;border-radius:10px;
    font-size:.84rem;margin-bottom:16px;display:none;
}
.field{margin-bottom:15px;}
.field label{
    display:block;font-size:.71rem;font-weight:600;
    letter-spacing:.1em;text-transform:uppercase;
    color:var(--muted);margin-bottom:7px;
}
.field input{
    width:100%;padding:12px 15px;
    background:rgba(255,255,255,.04);
    border:1px solid var(--bord2);border-radius:11px;
    font-size:.93rem;font-family:'Outfit',sans-serif;
    color:var(--text);outline:none;transition:border .2s,box-shadow .2s;
}
.field input::placeholder{color:var(--muted);}
.field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(200,255,0,.08);}

.btn-prime{
    width:100%;padding:13px;margin-top:8px;
    background:var(--accent);color:#000;border:none;border-radius:11px;
    font-family:'Outfit',sans-serif;font-weight:700;font-size:.93rem;
    cursor:pointer;letter-spacing:.2px;transition:all .2s;position:relative;overflow:hidden;
}
.btn-prime::after{
    content:'';position:absolute;inset:0;
    background:linear-gradient(135deg,rgba(255,255,255,.14),transparent);
    pointer-events:none;
}
.btn-prime:hover{transform:translateY(-1px);box-shadow:0 8px 26px rgba(200,255,0,.35);}
.btn-prime:active{transform:none;box-shadow:none;}
.btn-prime:disabled{opacity:.38;cursor:not-allowed;transform:none;box-shadow:none;}

/* ─── APP ──────────────────────────────── */
#app{display:none;flex-direction:column;min-height:100vh;position:relative;z-index:1;}

.header{
    position:sticky;top:0;z-index:500;
    background:rgba(10,10,15,.88);backdrop-filter:blur(22px);
    border-bottom:1px solid var(--border);
    height:60px;display:flex;align-items:center;
    justify-content:space-between;padding:0 24px;
}
.hdr-logo{
    font-family:'Bebas Neue',sans-serif;font-size:1.65rem;letter-spacing:3px;
    background:linear-gradient(90deg,var(--accent),#80ff00);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.hdr-right{display:flex;align-items:center;gap:12px;}
.user-chip{
    display:flex;align-items:center;gap:8px;
    background:rgba(255,255,255,.05);border:1px solid var(--bord2);
    padding:5px 13px 5px 5px;border-radius:30px;transition:background .2s;cursor:default;
}
.user-chip:hover{background:rgba(255,255,255,.08);}
.user-chip img{width:30px;height:30px;border-radius:50%;border:2px solid var(--accent);}
.user-chip span{font-size:.82rem;font-weight:600;color:var(--text);}
.btn-logout{
    background:none;border:1px solid var(--bord2);color:var(--muted);
    border-radius:8px;padding:6px 13px;cursor:pointer;
    font-family:'Outfit',sans-serif;font-size:.78rem;font-weight:500;
    transition:all .2s;
}
.btn-logout:hover{border-color:var(--danger);color:var(--danger);}

/* layout */
.layout{
    display:flex;justify-content:center;gap:26px;
    padding:28px 18px;max-width:1100px;margin:0 auto;
    width:100%;align-items:flex-start;
}

/* sidebar */
.sidebar{width:310px;flex-shrink:0;position:sticky;top:88px;}

.panel{
    background:var(--card);border:1px solid var(--border);
    border-radius:var(--r);overflow:hidden;
    box-shadow:0 6px 40px rgba(0,0,0,.4);
}
.panel-hd{
    padding:15px 18px;border-bottom:1px solid var(--border);
    display:flex;align-items:center;gap:9px;
    font-weight:700;font-size:.88rem;letter-spacing:.2px;
}
.dot{
    width:8px;height:8px;border-radius:50%;
    background:var(--accent);box-shadow:0 0 9px var(--accent);
    animation:pulse 2s ease-in-out infinite;flex-shrink:0;
}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.45;transform:scale(.75)}}
.panel-bd{padding:16px;}

/* drop zone */
.dz{
    border:1.5px dashed var(--bord2);border-radius:11px;
    padding:26px 14px;text-align:center;cursor:pointer;
    transition:all .2s;background:rgba(255,255,255,.02);
    position:relative;overflow:hidden;
}
.dz.over{border-color:var(--accent);background:rgba(200,255,0,.04);}
.dz.has-img{border-style:solid;border-color:var(--purple);padding:0;}
.dz input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.dz-icon{font-size:2rem;margin-bottom:9px;}
.dz-title{font-weight:600;font-size:.88rem;color:var(--text);margin-bottom:4px;}
.dz-sub{font-size:.75rem;color:var(--muted);}
.prev-img{width:100%;display:none;border-radius:9px;max-height:190px;object-fit:cover;}
.rm-btn{
    position:absolute;top:7px;right:7px;
    background:rgba(0,0,0,.72);color:#fff;
    border:none;border-radius:50%;width:27px;height:27px;
    cursor:pointer;font-size:.85rem;
    display:none;align-items:center;justify-content:center;
    transition:background .2s;z-index:2;
}
.rm-btn:hover{background:var(--danger);}
.dz.has-img .rm-btn{display:flex;}

textarea.cap{
    width:100%;margin-top:12px;padding:11px 13px;
    background:rgba(255,255,255,.03);border:1px solid var(--bord2);
    border-radius:11px;font-family:'Outfit',sans-serif;
    font-size:.87rem;color:var(--text);resize:none;height:84px;
    outline:none;transition:border .2s,box-shadow .2s;line-height:1.5;
}
textarea.cap::placeholder{color:var(--muted);}
textarea.cap:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(200,255,0,.06);}

.btn-post{
    width:100%;margin-top:11px;padding:12px;
    background:var(--accent);color:#000;border:none;border-radius:11px;
    font-family:'Outfit',sans-serif;font-weight:700;font-size:.9rem;
    cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;
    transition:all .2s;
}
.btn-post:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(200,255,0,.3);}
.btn-post:active{transform:none;box-shadow:none;}
.btn-post:disabled{opacity:.35;cursor:not-allowed;transform:none;box-shadow:none;}

.stats{
    margin-top:14px;background:var(--card);
    border:1px solid var(--border);border-radius:var(--r);
    display:flex;overflow:hidden;
}
.stat{flex:1;text-align:center;padding:14px 8px;}
.stat+.stat{border-left:1px solid var(--border);}
.stat-n{
    font-family:'Bebas Neue',sans-serif;font-size:1.55rem;
    color:var(--accent);letter-spacing:1px;line-height:1;
}
.stat-l{font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-top:3px;}

/* ─── FEED ─────────────────────────────── */
.feed{flex:1;min-width:0;max-width:600px;}
.feed-empty{text-align:center;padding:70px 20px;color:var(--muted);}
.feed-empty .ei{font-size:3.2rem;margin-bottom:14px;filter:grayscale(.4);}
.feed-empty h3{font-weight:700;color:var(--text);margin-bottom:7px;font-size:1.05rem;}
.feed-empty p{font-size:.86rem;}

.post{
    background:var(--card);border:1px solid var(--border);
    border-radius:var(--r);margin-bottom:20px;overflow:hidden;
    box-shadow:0 4px 30px rgba(0,0,0,.3);
    animation:fadeUp .4s cubic-bezier(.22,1,.36,1) both;
    transition:border-color .2s,box-shadow .2s;
}
.post:hover{border-color:var(--bord2);box-shadow:0 8px 42px rgba(0,0,0,.42);}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}

.post-hd{padding:13px 15px;display:flex;align-items:center;gap:10px;}
.post-av{width:40px;height:40px;border-radius:50%;border:2px solid var(--bord2);flex-shrink:0;background:var(--bg2);}
.post-author{font-weight:700;font-size:.88rem;}
.post-time{font-size:.73rem;color:var(--muted);margin-top:2px;}
.post-img{width:100%;max-height:520px;object-fit:cover;display:block;border-top:1px solid var(--border);border-bottom:1px solid var(--border);}
.post-bd{padding:13px 15px 15px;}
.post-cap{font-size:.88rem;line-height:1.55;color:rgba(232,232,240,.84);margin-bottom:13px;}

.post-acts{display:flex;gap:8px;margin-bottom:13px;}
.r-btn{
    display:flex;align-items:center;gap:6px;
    padding:7px 15px;border-radius:30px;
    border:1px solid var(--bord2);background:rgba(255,255,255,.03);
    font-size:.84rem;font-weight:600;font-family:'Outfit',sans-serif;
    color:var(--muted);cursor:pointer;transition:all .18s;
}
.r-btn:hover{border-color:rgba(255,255,255,.22);color:var(--text);}
.r-btn.liked{background:rgba(255,45,120,.1);border-color:rgba(255,45,120,.4);color:var(--pink);}
.r-btn.disliked{background:rgba(124,58,237,.1);border-color:rgba(124,58,237,.4);color:#a78bfa;}

.cmt-sec{border-top:1px solid var(--border);padding-top:13px;}
.cmt-list{
    list-style:none;max-height:170px;overflow-y:auto;
    margin-bottom:11px;
    scrollbar-width:thin;scrollbar-color:var(--bord2) transparent;
}
.cmt-list::-webkit-scrollbar{width:4px;}
.cmt-list::-webkit-scrollbar-thumb{background:var(--bord2);border-radius:4px;}
.cmt-list li{
    display:flex;gap:8px;margin-bottom:9px;
    align-items:flex-start;font-size:.84rem;
    animation:fadeUp .2s ease;
}
.cmt-list li img{
    width:25px;height:25px;border-radius:50%;flex-shrink:0;
    border:1px solid var(--bord2);background:var(--bg2);
}
.cmt-bub{
    background:rgba(255,255,255,.04);border:1px solid var(--border);
    border-radius:4px 11px 11px 11px;padding:7px 11px;flex:1;
}
.cmt-user{font-weight:700;font-size:.76rem;color:var(--accent);margin-bottom:2px;}
.cmt-txt{color:rgba(232,232,240,.8);line-height:1.4;}

.cmt-row{display:flex;gap:8px;align-items:center;}
.cmt-row input{
    flex:1;padding:8px 13px;
    background:rgba(255,255,255,.04);border:1px solid var(--bord2);
    border-radius:30px;font-size:.84rem;font-family:'Outfit',sans-serif;
    color:var(--text);outline:none;transition:border .2s,box-shadow .2s;
}
.cmt-row input::placeholder{color:var(--muted);}
.cmt-row input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(200,255,0,.06);}
.btn-send{
    background:var(--accent);color:#000;border:none;border-radius:50%;
    width:35px;height:35px;font-size:.88rem;font-weight:700;
    cursor:pointer;display:flex;align-items:center;justify-content:center;
    flex-shrink:0;transition:all .18s;
}
.btn-send:hover{transform:scale(1.1);box-shadow:0 0 14px rgba(200,255,0,.42);}

/* skeleton */
.skel-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);margin-bottom:20px;padding:16px;overflow:hidden;}
.sk{
    background:linear-gradient(90deg,rgba(255,255,255,.04) 0%,rgba(255,255,255,.08) 50%,rgba(255,255,255,.04) 100%);
    background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px;margin-bottom:10px;
}
@keyframes shimmer{to{background-position:-200% 0}}
.sk-circle{border-radius:50%;width:40px;height:40px;flex-shrink:0;}
.sk-img{height:270px;border-radius:10px;}

/* spinner */
.spin{
    width:17px;height:17px;border:2px solid rgba(0,0,0,.2);
    border-top-color:#000;border-radius:50%;
    animation:spinA .6s linear infinite;display:inline-block;
}
@keyframes spinA{to{transform:rotate(360deg)}}

/* mobile */
.mob-fab{
    display:none;position:fixed;bottom:22px;right:22px;z-index:800;
    background:var(--accent);color:#000;width:54px;height:54px;
    border-radius:50%;border:none;font-size:1.55rem;font-weight:700;
    align-items:center;justify-content:center;
    box-shadow:0 8px 28px rgba(200,255,0,.4);cursor:pointer;transition:all .2s;
}
.mob-fab:hover{transform:scale(1.07);}
.mob-sheet{
    display:none;position:fixed;inset:0;z-index:700;
    background:rgba(0,0,0,.72);backdrop-filter:blur(5px);align-items:flex-end;
}
.mob-inner{
    background:var(--card);border:1px solid var(--bord2);
    width:100%;border-radius:22px 22px 0 0;
    padding:22px 18px;max-height:90vh;overflow-y:auto;
}

/* toast */
.toast{
    position:fixed;bottom:26px;left:50%;
    transform:translateX(-50%) translateY(88px);
    background:var(--card);border:1px solid var(--bord2);
    color:var(--text);padding:11px 22px;border-radius:30px;
    font-weight:600;font-size:.87rem;z-index:9999;
    transition:transform .35s cubic-bezier(.22,1,.36,1);
    pointer-events:none;box-shadow:0 8px 30px rgba(0,0,0,.55);white-space:nowrap;
}
.toast.show{transform:translateX(-50%) translateY(0);}

@media(max-width:720px){
    .sidebar,.stats{display:none;}
    .feed{max-width:100%;}
    .mob-fab{display:flex;}
    .layout{padding:14px;}
}
</style>
</head>
<body>
<div class="blob blob1"></div>
<div class="blob blob2"></div>

<!-- AUTH -->
<div id="auth-overlay">
    <div class="auth-wrap">
        <div class="auth-logo">
            <div class="auth-logo-text">OBERFANS</div>
            <div class="auth-logo-sub">Creator Platform</div>
        </div>
        <div class="auth-card">
            <div class="auth-tabs">
                <button class="auth-tab active" id="tl" onclick="tab('login')">Einloggen</button>
                <button class="auth-tab" id="tr" onclick="tab('reg')">Registrieren</button>
            </div>
            <div class="auth-body">
                <div id="auth-err" class="auth-err"></div>
                <div id="fl">
                    <div class="field"><label>Benutzername</label>
                        <input id="lu" type="text" placeholder="dein_name" autocomplete="username"></div>
                    <div class="field"><label>Passwort</label>
                        <input id="lp" type="password" placeholder="••••••••" autocomplete="current-password"
                               onkeydown="if(event.key==='Enter')login()"></div>
                    <button class="btn-prime" onclick="login()">Einloggen →</button>
                </div>
                <div id="fr" style="display:none">
                    <div class="field"><label>Benutzername</label>
                        <input id="ru" type="text" placeholder="dein_name" autocomplete="username"></div>
                    <div class="field"><label>Passwort <span style="opacity:.4;font-size:.85em">(min. 6 Zeichen)</span></label>
                        <input id="rp" type="password" placeholder="••••••••" autocomplete="new-password"
                               onkeydown="if(event.key==='Enter')reg()"></div>
                    <button class="btn-prime" onclick="reg()">Konto erstellen →</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- APP -->
<div id="app">
    <header class="header">
        <div class="hdr-logo">OBERFANS</div>
        <div class="hdr-right">
            <div class="user-chip">
                <img id="hav" src="" alt="">
                <span id="hun"></span>
            </div>
            <button class="btn-logout" onclick="logout()">Abmelden</button>
        </div>
    </header>

    <div class="layout">
        <aside class="sidebar">
            <div class="panel">
                <div class="panel-hd"><div class="dot"></div>Neuer Post</div>
                <div class="panel-bd">
                    <div class="dz" id="dz">
                        <input type="file" id="fi" accept="image/*" onchange="onFile(this,false)">
                        <div id="dzp"><div class="dz-icon">🖼️</div>
                            <div class="dz-title">Bild ablegen oder klicken</div>
                            <div class="dz-sub">JPG, PNG, GIF · max. 10 MB</div>
                        </div>
                        <img class="prev-img" id="pi" src="" alt="">
                        <button class="rm-btn" onclick="rm(event,false)">✕</button>
                    </div>
                    <textarea class="cap" id="cap" placeholder="Erzähl deinen Fans etwas..."></textarea>
                    <button class="btn-post" id="bp" onclick="post(false)"><span>Posten</span></button>
                </div>
            </div>
            <div class="stats" id="stats">
                <div class="stat"><div class="stat-n" id="stp">0</div><div class="stat-l">Posts</div></div>
                <div class="stat"><div class="stat-n" id="stl">0</div><div class="stat-l">Likes</div></div>
                <div class="stat"><div class="stat-n" id="stc">0</div><div class="stat-l">Kommentare</div></div>
            </div>
        </aside>
        <main class="feed" id="feed"></main>
    </div>
</div>

<button class="mob-fab" onclick="openSheet()">＋</button>
<div class="mob-sheet" id="ms" onclick="closeSheet(event)">
    <div class="mob-inner">
        <div style="font-weight:700;font-size:.95rem;margin-bottom:14px;display:flex;align-items:center;gap:8px;">
            <div class="dot"></div>Neuer Post
        </div>
        <div class="dz" id="dzm">
            <input type="file" id="fim" accept="image/*" onchange="onFile(this,true)">
            <div id="dzpm"><div class="dz-icon">🖼️</div>
                <div class="dz-title">Bild auswählen</div>
                <div class="dz-sub">max. 10 MB</div>
            </div>
            <img class="prev-img" id="pim" src="" alt="" style="display:none">
            <button class="rm-btn" onclick="rm(event,true)">✕</button>
        </div>
        <textarea class="cap" id="capm" placeholder="Erzähl deinen Fans etwas..."></textarea>
        <button class="btn-post" id="bpm" onclick="post(true)"><span>Posten</span></button>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'https://oberfans-production.up.railway.app/api';
let token = localStorage.getItem('of_token');
let uname = localStorage.getItem('of_user');
let uavt  = localStorage.getItem('of_avatar');
let fD = null, fM = null;

window.onload = () => { if (token && uname) showApp(); };

/* TABS */
function tab(t) {
    document.getElementById('fl').style.display  = t==='login' ? '' : 'none';
    document.getElementById('fr').style.display  = t==='reg'   ? '' : 'none';
    document.getElementById('tl').classList.toggle('active', t==='login');
    document.getElementById('tr').classList.toggle('active', t==='reg');
    document.getElementById('auth-err').style.display = 'none';
}
function err(m) { const e=document.getElementById('auth-err'); e.textContent=m; e.style.display='block'; }

/* AUTH */
async function reg() {
    const u=document.getElementById('ru').value.trim(), p=document.getElementById('rp').value;
    document.getElementById('auth-err').style.display='none';
    try {
        const r=await fetch(`${API}/register`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
        const d=await r.json();
        if(!r.ok) return err(d.error);
        toast('✅ Konto erstellt! Jetzt einloggen.');
        tab('login');
        document.getElementById('lu').value=u;
    } catch { err('Server nicht erreichbar.'); }
}

async function login() {
    const u=document.getElementById('lu').value.trim(), p=document.getElementById('lp').value;
    document.getElementById('auth-err').style.display='none';
    try {
        const r=await fetch(`${API}/login`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
        const d=await r.json();
        if(!r.ok) return err(d.error);
        token=d.token; uname=d.username; uavt=d.avatar;
        localStorage.setItem('of_token',token);
        localStorage.setItem('of_user',uname);
        localStorage.setItem('of_avatar',uavt);
        showApp();
    } catch { err('Server nicht erreichbar.'); }
}

function logout() {
    ['of_token','of_user','of_avatar'].forEach(k=>localStorage.removeItem(k));
    location.reload();
}

function showApp() {
    document.getElementById('auth-overlay').style.display='none';
    document.getElementById('app').style.display='flex';
    document.getElementById('hun').textContent='@'+uname;
    document.getElementById('hav').src=uavt;
    loadFeed();
    // DnD setup
    document.addEventListener('dragover',e=>e.preventDefault());
    document.addEventListener('drop',e=>e.preventDefault());
    setupDZ('dz','pi','dzp',false);
    setupDZ('dzm','pim','dzpm',true);
}

/* DROP ZONE */
function setupDZ(zId,pId,phId,mob) {
    const z=document.getElementById(zId); if(!z) return;
    z.addEventListener('dragover',e=>{e.stopPropagation();z.classList.add('over');});
    z.addEventListener('dragleave',()=>z.classList.remove('over'));
    z.addEventListener('drop',e=>{
        e.stopPropagation();z.classList.remove('over');
        const f=e.dataTransfer.files[0];
        if(f&&f.type.startsWith('image/')) setFile(f,pId,phId,zId,mob);
    });
}

function onFile(inp,mob) {
    const f=inp.files[0]; if(!f) return;
    mob ? setFile(f,'pim','dzpm','dzm',true) : setFile(f,'pi','dzp','dz',false);
}

function setFile(f,pId,phId,zId,mob) {
    mob ? fM=f : fD=f;
    const reader=new FileReader();
    reader.onload=e=>{
        const img=document.getElementById(pId);
        img.src=e.target.result; img.style.display='block';
        document.getElementById(phId).style.display='none';
        document.getElementById(zId).classList.add('has-img');
    };
    reader.readAsDataURL(f);
}

function rm(e,mob) {
    e.stopPropagation();
    mob ? (fM=null,resetDZ('dzm','pim','dzpm','fim')) : (fD=null,resetDZ('dz','pi','dzp','fi'));
}

function resetDZ(zId,pId,phId,inpId) {
    const img=document.getElementById(pId); img.src=''; img.style.display='none';
    document.getElementById(phId).style.display='';
    document.getElementById(zId).classList.remove('has-img','over');
    document.getElementById(inpId).value='';
}

/* POST */
async function post(mob) {
    const capId=mob?'capm':'cap', btnId=mob?'bpm':'bp', file=mob?fM:fD;
    const cap=document.getElementById(capId).value.trim();
    if(!file&&!cap) return toast('⚠️ Bild oder Text erforderlich');
    const btn=document.getElementById(btnId);
    btn.disabled=true; btn.innerHTML='<span class="spin"></span>';
    const fd=new FormData();
    if(file) fd.append('image',file);
    fd.append('caption',cap);
    try {
        const r=await fetch(`${API}/posts`,{method:'POST',headers:{Authorization:'Bearer '+token},body:fd});
        if(!r.ok) throw new Error();
        document.getElementById(capId).value='';
        if(mob){fM=null;resetDZ('dzm','pim','dzpm','fim');closeSheet();}
        else{fD=null;resetDZ('dz','pi','dzp','fi');}
        toast('✅ Post veröffentlicht!');
        loadFeed();
    } catch { toast('❌ Fehler beim Posten'); }
    finally { btn.disabled=false; btn.innerHTML='<span>Posten</span>'; }
}

/* FEED */
async function loadFeed() {
    const feed=document.getElementById('feed');
    feed.innerHTML=skel(3);
    try {
        const r=await fetch(`${API}/posts`,{headers:{Authorization:'Bearer '+token}});
        if(r.status===401){logout();return;}
        const posts=await r.json();
        feed.innerHTML='';
        if(!posts.length){
            feed.innerHTML=`<div class="feed-empty"><div class="ei">📭</div><h3>Noch keine Posts</h3><p>Sei der Erste!</p></div>`;
            return;
        }
        posts.forEach((p,i)=>{
            const el=document.createElement('div');
            el.innerHTML=renderPost(p);
            const card=el.firstElementChild;
            card.style.animationDelay=(i*.07)+'s';
            feed.appendChild(card);
        });
        // stats
        document.getElementById('stp').textContent=posts.length;
        document.getElementById('stl').textContent=posts.reduce((a,p)=>a+p.likes.length,0);
        document.getElementById('stc').textContent=posts.reduce((a,p)=>a+p.comments.length,0);
    } catch {
        feed.innerHTML=`<div class="feed-empty"><div class="ei">⚠️</div><h3>Server nicht erreichbar</h3><p>Railway-Deployment prüfen.</p></div>`;
    }
}

function skel(n) {
    return Array.from({length:n},(_,i)=>`
        <div class="skel-card">
            <div style="display:flex;gap:10px;align-items:center;margin-bottom:13px">
                <div class="sk sk-circle"></div>
                <div style="flex:1">
                    <div class="sk" style="width:38%;height:11px;margin-bottom:6px"></div>
                    <div class="sk" style="width:22%;height:9px"></div>
                </div>
            </div>
            <div class="sk sk-img"></div>
        </div>`).join('');
}

function renderPost(p) {
    const liked=p.likes.includes(uname), disliked=p.dislikes.includes(uname);
    const time=new Date(p.createdAt).toLocaleDateString('de-DE',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
    const cmts=p.comments.map(c=>`
        <li>
            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=${enc(c.user)}" alt="">
            <div class="cmt-bub"><div class="cmt-user">@${c.user}</div><div class="cmt-txt">${esc(c.text)}</div></div>
        </li>`).join('');
    return `
    <article class="post">
        <div class="post-hd">
            <img class="post-av" src="${p.avatar}" alt="" onerror="this.src='https://api.dicebear.com/7.x/avataaars/svg?seed=${enc(p.author)}'">
            <div><div class="post-author">@${p.author}</div><div class="post-time">${time}</div></div>
        </div>
        ${p.imageUrl?`<img class="post-img" src="${p.imageUrl}" alt="" loading="lazy">`:''}
        <div class="post-bd">
            ${p.caption?`<p class="post-cap">${esc(p.caption)}</p>`:''}
            <div class="post-acts">
                <button class="r-btn ${liked?'liked':''}" onclick="react('${p.id}','like',this)">❤️ <span id="lc-${p.id}">${p.likes.length}</span></button>
                <button class="r-btn ${disliked?'disliked':''}" onclick="react('${p.id}','dislike',this)">👎 <span id="dc-${p.id}">${p.dislikes.length}</span></button>
            </div>
            <div class="cmt-sec">
                <ul class="cmt-list" id="cl-${p.id}">${cmts}</ul>
                <div class="cmt-row">
                    <input type="text" id="ci-${p.id}" placeholder="Kommentieren..."
                           onkeydown="if(event.key==='Enter')comment('${p.id}')">
                    <button class="btn-send" onclick="comment('${p.id}')">➤</button>
                </div>
            </div>
        </div>
    </article>`;
}

/* REACT */
async function react(pid,type,btn) {
    const r=await fetch(`${API}/posts/${pid}/react`,{
        method:'POST',headers:{'Content-Type':'application/json',Authorization:'Bearer '+token},
        body:JSON.stringify({type})
    });
    if(!r.ok) return;
    const d=await r.json();
    document.getElementById('lc-'+pid).textContent=d.likes;
    document.getElementById('dc-'+pid).textContent=d.dislikes;
    const card=btn.closest('.post');
    card.querySelectorAll('.r-btn').forEach(b=>b.classList.remove('liked','disliked'));
    if(type==='like'&&d.likes>0) btn.classList.add('liked');
    if(type==='dislike'&&d.dislikes>0) btn.classList.add('disliked');
}

/* COMMENT */
async function comment(pid) {
    const inp=document.getElementById('ci-'+pid);
    const text=inp.value.trim(); if(!text) return;
    inp.value='';
    const r=await fetch(`${API}/posts/${pid}/comment`,{
        method:'POST',headers:{'Content-Type':'application/json',Authorization:'Bearer '+token},
        body:JSON.stringify({text})
    });
    if(!r.ok) return;
    const c=await r.json();
    const list=document.getElementById('cl-'+pid);
    const li=document.createElement('li');
    li.innerHTML=`
        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=${enc(c.user)}" alt="">
        <div class="cmt-bub"><div class="cmt-user">@${c.user}</div><div class="cmt-txt">${esc(c.text)}</div></div>`;
    list.appendChild(li);
    list.scrollTop=list.scrollHeight;
}

/* MOBILE */
function openSheet(){document.getElementById('ms').style.display='flex';}
function closeSheet(e){if(!e||e.target===document.getElementById('ms'))document.getElementById('ms').style.display='none';}

/* TOAST */
function toast(msg){
    const t=document.getElementById('toast');
    t.textContent=msg;t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'),3000);
}

/* UTILS */
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function enc(s){return encodeURIComponent(s);}
</script>
